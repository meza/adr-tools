name: Verify PR

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]

permissions:
  contents: read
env:
  NODE_VERSION: 24.x

jobs:
  verifypr:
    strategy:
      fail-fast: false
      matrix:
        runner: [meza-ubuntu-slim, meza-windows-latest]
    name: Verify PR on ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: corepack enable

      - run: yarn --immutable
      - run: yarn ci

  verify:
    name: Verify PR
    needs: verifypr
    if: ${{ always() }}
    runs-on: ubuntu-slim

    steps:
      - name: Require successful platform verification
        env:
          VERIFY_RESULT: ${{ needs.verifypr.result }}
        run: |
          if [ "$VERIFY_RESULT" != "success" ]; then
            echo "::error::One or more platform verification jobs did not succeed."
            exit 1
          fi
